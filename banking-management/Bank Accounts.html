<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Bank Accounts — Star Unity Development Ltd</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink:        #14181f;
    --ink-2:      #2a2f3a;
    --ink-3:      #4a5160;
    --muted:      #6b7280;
    --muted-2:    #9aa0a6;
    --rule:       #e4e4e7;
    --rule-soft:  #ececec;
    --paper:      #ffffff;
    --canvas:     #f6f6f7;
    --accent:     #0d2a4a;
    --accent-soft:#eaf0f8;
    --warn:       #a16207;
    --warn-bg:    #fef9e7;
    --warn-bd:    #f3e3a8;
    --ok:         #1f6f43;
    --ok-bg:      #e9f4ee;
    --ok-bd:      #bfddc8;
    --danger:     #8a1212;
    --danger-bg:  #fbeaea;
    --danger-bd:  #f1c2c2;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--canvas); color: var(--ink); font-family: "Inter", system-ui, -apple-system, sans-serif; font-size: 13px; line-height: 1.45; -webkit-font-smoothing: antialiased; }

  /* ===================== Top bar ===================== */
  .topbar { background: var(--paper); border-bottom: 1px solid var(--rule); padding: 10px 24px; display: flex; align-items: center; gap: 16px; }
  .crumbs { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); }
  .crumbs a { color: var(--muted); text-decoration: none; }
  .crumbs a:hover { color: var(--ink); }
  .crumbs .sep { color: var(--muted-2); }
  .crumbs .here { color: var(--ink); font-weight: 600; }
  .topbar .grow { flex: 1; }
  .user-chip { display: inline-flex; align-items: center; gap: 8px; font-size: 12px; color: var(--ink-2); padding: 4px 10px 4px 4px; border: 1px solid var(--rule); border-radius: 999px; }
  .user-chip .av { width: 22px; height: 22px; border-radius: 50%; background: var(--accent); color: #fff; display: grid; place-items: center; font-family: "Instrument Serif", Georgia, serif; font-size: 13px; }

  .page { padding: 22px 24px 80px; max-width: 1480px; margin: 0 auto; }
  .page-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; margin-bottom: 18px; }
  .page-head h1 { font-family: "Instrument Serif", Georgia, serif; font-weight: 400; font-size: 32px; margin: 0 0 4px; letter-spacing: 0.2px; }
  .page-head .sub { font-size: 12.5px; color: var(--muted); }
  .page-head .actions-row { display: flex; gap: 8px; }
  .btn { font-family: inherit; font-size: 12.5px; font-weight: 500; padding: 8px 14px; border-radius: 6px; border: 1px solid var(--rule); background: var(--paper); color: var(--ink-2); cursor: pointer; display: inline-flex; align-items: center; gap: 6px; line-height: 1; }
  .btn:hover { background: #fafafb; }
  .btn.primary { background: var(--ink); color: #fff; border-color: var(--ink); }
  .btn.primary:hover { background: #000; }
  .btn .ic { width: 13px; height: 13px; }

  /* ===================== Primary tabs (anchor links) ===================== */
  .nav-tabs { display: flex; gap: 4px; margin-bottom: 18px; border-bottom: 1px solid var(--rule); padding: 0 2px; }
  .nav-tab { background: transparent; border: 0; font-family: inherit; font-size: 13px; font-weight: 500; color: var(--muted); padding: 10px 16px 12px; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; position: relative; border-bottom: 2px solid transparent; margin-bottom: -1px; text-decoration: none; }
  .nav-tab:hover { color: var(--ink-2); }
  .nav-tab.active { color: var(--ink); border-bottom-color: var(--ink); font-weight: 600; }
  .nav-tab .ic { width: 14px; height: 14px; }
  .nav-tab .pill { font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 10.5px; padding: 1px 7px; border-radius: 999px; background: #f0f0f1; color: var(--ink-2); font-weight: 600; letter-spacing: 0.3px; }
  .nav-tab.active .pill { background: var(--accent); color: #fff; }

  /* ===================== Totals bar ===================== */
  .totals-bar { display: grid; grid-template-columns: 1.4fr repeat(4, 1fr); gap: 12px; margin-bottom: 18px; }
  .total-card { background: var(--paper); border: 1px solid var(--rule); border-radius: 10px; padding: 16px 18px; }
  .total-card.main { background: var(--accent); color: #fff; border-color: var(--accent); }
  .total-card .lbl { font-size: 10.5px; letter-spacing: 0.8px; text-transform: uppercase; color: var(--muted); font-weight: 600; display: flex; align-items: center; gap: 6px; }
  .total-card.main .lbl { color: rgba(255,255,255,0.7); }
  .total-card .val { font-family: "Instrument Serif", Georgia, serif; font-size: 32px; line-height: 1; margin-top: 10px; }
  .total-card .val .cur { font-family: "Inter", sans-serif; font-size: 13px; color: var(--muted); vertical-align: 6px; margin-right: 4px; letter-spacing: 0.5px; }
  .total-card.main .val .cur { color: rgba(255,255,255,0.7); }
  .total-card .meta { font-size: 11px; color: var(--muted); margin-top: 8px; font-family: "JetBrains Mono", ui-monospace, monospace; }
  .total-card.main .meta { color: rgba(255,255,255,0.7); }
  .total-card .delta { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; font-family: "Inter", sans-serif; font-weight: 600; padding: 2px 7px; border-radius: 999px; margin-left: 6px; }
  .delta.up { background: var(--ok-bg); color: var(--ok); }
  .delta.down { background: var(--danger-bg); color: var(--danger); }

  /* ===================== Accounts bar ===================== */
  .accounts-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .accounts-bar .title { font-family: "Instrument Serif", Georgia, serif; font-size: 18px; color: var(--ink); }
  .accounts-bar .filters { display: flex; gap: 8px; align-items: center; }
  .seg { display: inline-flex; background: #f3f4f6; padding: 3px; border-radius: 7px; gap: 2px; }
  .seg button { background: transparent; border: 0; font-family: inherit; font-size: 11.5px; font-weight: 500; padding: 5px 10px; border-radius: 5px; cursor: pointer; color: var(--ink-3); }
  .seg button.on { background: var(--paper); color: var(--ink); box-shadow: 0 1px 2px rgba(0,0,0,0.08); font-weight: 600; }
  .select { font-family: inherit; font-size: 12.5px; padding: 7px 26px 7px 10px; border: 1px solid var(--rule); border-radius: 6px; background: var(--paper) url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 24 24' fill='none' stroke='%236b7280' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>") no-repeat right 10px center; appearance: none; color: var(--ink-2); cursor: pointer; }

  .search-wrap { position: relative; }
  .search-wrap svg { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--muted-2); }
  .input { font-family: inherit; font-size: 12.5px; padding: 7px 10px 7px 30px; border: 1px solid var(--rule); border-radius: 6px; background: var(--paper); color: var(--ink-2); min-width: 220px; }
  .input::placeholder { color: var(--muted-2); }

  /* ===================== Accounts grid ===================== */
  .accounts-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .acc-card { background: var(--paper); border: 1px solid var(--rule); border-radius: 12px; padding: 18px; position: relative; overflow: hidden; transition: box-shadow 0.15s, transform 0.15s; cursor: pointer; }
  .acc-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.06); transform: translateY(-1px); }
  .acc-card.target { box-shadow: 0 0 0 3px var(--accent-soft), 0 6px 20px rgba(13,42,74,0.18); border-color: var(--accent); }
  .acc-card .stripe { position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }
  .acc-card .head { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .acc-card .head .pills { display: flex; flex-direction: column; gap: 4px; align-items: flex-end; }
  .acc-card .bank { display: flex; align-items: center; gap: 10px; }
  .acc-card .logo { width: 36px; height: 36px; border-radius: 7px; display: grid; place-items: center; font-family: "Instrument Serif", Georgia, serif; font-size: 17px; font-weight: 600; color: #fff; letter-spacing: 0.5px; flex-shrink: 0; }
  .acc-card .bank-name { font-size: 13px; font-weight: 600; color: var(--ink); line-height: 1.2; }
  .acc-card .bank-br { font-size: 10.5px; color: var(--muted); margin-top: 2px; }
  .status-pill { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 999px; font-size: 9.5px; font-weight: 600; letter-spacing: 0.4px; text-transform: uppercase; border: 1px solid; }
  .status-pill.active { background: var(--ok-bg); border-color: var(--ok-bd); color: var(--ok); }
  .status-pill.inactive { background: #f0f0f1; border-color: var(--rule); color: var(--muted); }
  .status-pill .dot { width: 5px; height: 5px; border-radius: 50%; }
  .status-pill.active .dot { background: var(--ok); }
  .status-pill.inactive .dot { background: var(--muted); }

  /* Type pill — BANK / CASH / MFS / WALLET */
  .type-pill { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 999px; font-size: 9.5px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; border: 1px solid; }
  .type-pill.bank   { background: #eaf0f8; border-color: #c8d6e8; color: #0d2a4a; }
  .type-pill.cash   { background: #fef3c7; border-color: #fcd34d; color: #92400e; }
  .type-pill.mfs    { background: #fce7f3; border-color: #f9a8d4; color: #be185d; }
  .type-pill.wallet { background: #ede9fe; border-color: #c4b5fd; color: #6d28d9; }
  .type-pill svg { width: 9px; height: 9px; }
  .pill-row { display: flex; gap: 4px; flex-wrap: wrap; }

  /* Type pill (BANK / CASH / MFS / WALLET) */
  .type-pill { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 999px; font-size: 9.5px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; border: 1px solid; }
  .type-pill.bank   { background: #eaf0f8; border-color: #c8d6e8; color: #0d2a4a; }
  .type-pill.cash   { background: #fef4e3; border-color: #f5d59a; color: #b45309; }
  .type-pill.mfs    { background: #fce7f1; border-color: #f5b8d4; color: #be185d; }
  .type-pill.wallet { background: #ede9fe; border-color: #c9bff4; color: #5b3a99; }

  .acc-card .label-row { margin-top: 16px; font-size: 10.5px; letter-spacing: 0.8px; text-transform: uppercase; color: var(--muted); font-weight: 600; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .acc-card .label-row .acc-code { font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 9.5px; color: var(--ink-2); background: #f0f1f3; padding: 2px 7px; border-radius: 4px; text-transform: none; letter-spacing: 0.3px; font-weight: 600; }
  .acc-card .acno-row { margin-top: 6px; display: flex; align-items: baseline; gap: 8px; }
  .acc-card .acno-row .acno-label { font-size: 9px; letter-spacing: 0.6px; text-transform: uppercase; color: var(--muted); font-weight: 600; }
  .acc-card .acno-row .acno-val { font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 12px; color: var(--ink-2); font-weight: 500; letter-spacing: 0.5px; }
  .acc-card .balance { font-family: "Instrument Serif", Georgia, serif; font-size: 30px; line-height: 1.1; color: var(--ink); margin-top: 10px; }
  .acc-card .balance .cur { font-family: "Inter", sans-serif; font-size: 12px; color: var(--muted); vertical-align: 5px; margin-right: 3px; letter-spacing: 0.5px; }
  .acc-card .flows { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; padding-top: 14px; border-top: 1px dashed var(--rule); }
  .flow .flow-lbl { font-size: 9.5px; letter-spacing: 0.6px; text-transform: uppercase; color: var(--muted); display: flex; align-items: center; gap: 4px; }
  .flow .flow-val { font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 12.5px; font-weight: 600; margin-top: 3px; }
  .flow.in .flow-val { color: var(--ok); }
  .flow.out .flow-val { color: var(--danger); }
  .flow .flow-arrow { width: 9px; height: 9px; }
  .acc-card .footer { display: flex; justify-content: space-between; align-items: center; margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--rule-soft); }
  .acc-card .last { font-size: 10.5px; color: var(--muted); }
  .acc-card .last .dt { font-family: "JetBrains Mono", ui-monospace, monospace; color: var(--ink-2); }
  .acc-card .quick { display: flex; gap: 4px; }
  .acc-card .quick button { background: transparent; border: 1px solid var(--rule); border-radius: 5px; width: 26px; height: 26px; display: grid; place-items: center; cursor: pointer; color: var(--muted); }
  .acc-card .quick button:hover { color: var(--ink); background: #fafafb; border-color: var(--ink-3); }
  .acc-card .quick button svg { width: 13px; height: 13px; }

  .acc-card.add { border: 1.5px dashed var(--rule); background: transparent; box-shadow: none; display: grid; place-items: center; text-align: center; min-height: 240px; color: var(--muted); }
  .acc-card.add:hover { border-color: var(--ink-3); color: var(--ink-2); background: #fafafb; transform: none; }
  .acc-card.add .plus { width: 44px; height: 44px; border: 1.5px solid currentColor; border-radius: 50%; display: grid; place-items: center; margin: 0 auto 10px; }
  .acc-card.add .plus svg { width: 18px; height: 18px; }
  .acc-card.add .lbl { font-size: 13px; font-weight: 600; }
  .acc-card.add .desc { font-size: 11.5px; margin-top: 4px; }

  /* ===================== Detail modal ===================== */
  #acc-modal { display: none; position: fixed; inset: 0; z-index: 100; }
  #acc-modal.open { display: block; }
  .modal-backdrop { position: absolute; inset: 0; background: rgba(20,24,31,0.45); backdrop-filter: blur(2px); animation: fadeIn .15s ease; }
  .modal-panel { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: min(820px, 92vw); max-height: 90vh; background: var(--paper); border-radius: 14px; box-shadow: 0 24px 60px rgba(0,0,0,0.28); display: flex; flex-direction: column; overflow: hidden; animation: popIn .18s ease; }
  @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
  @keyframes popIn { from { opacity: 0; transform: translate(-50%, -48%) scale(0.97) } to { opacity: 1; transform: translate(-50%, -50%) scale(1) } }
  .modal-head { display: flex; justify-content: space-between; align-items: center; padding: 16px 22px; border-bottom: 1px solid var(--rule); gap: 12px; }
  .modal-bank { display: flex; align-items: center; gap: 12px; }
  .modal-logo { width: 44px; height: 44px; border-radius: 8px; display: grid; place-items: center; color: #fff; font-family: "Instrument Serif", Georgia, serif; font-size: 20px; font-weight: 600; }
  .modal-name { font-family: "Instrument Serif", Georgia, serif; font-size: 22px; line-height: 1.1; color: var(--ink); }
  .modal-meta { font-size: 11.5px; color: var(--muted); margin-top: 3px; }
  .modal-meta .mono { font-family: "JetBrains Mono", ui-monospace, monospace; color: var(--ink-2); font-weight: 600; background: #f0f1f3; padding: 1px 6px; border-radius: 4px; margin-left: 4px; }
  .modal-actions { display: flex; align-items: center; gap: 8px; }
  .modal-close { background: transparent; border: 0; padding: 6px; border-radius: 6px; cursor: pointer; color: var(--muted); }
  .modal-close:hover { background: #f0f0f1; color: var(--ink); }
  .modal-body { padding: 18px 22px 22px; overflow-y: auto; }
  .modal-balance-card { background: linear-gradient(135deg, var(--accent) 0%, #1a4373 100%); color: #fff; border-radius: 10px; padding: 18px 22px; display: flex; justify-content: space-between; align-items: center; gap: 20px; margin-bottom: 22px; }
  .mbc-label { font-size: 10.5px; letter-spacing: 0.8px; text-transform: uppercase; color: rgba(255,255,255,0.7); font-weight: 600; }
  .mbc-val { font-family: "Instrument Serif", Georgia, serif; font-size: 38px; line-height: 1; margin-top: 6px; }
  .mbc-val .cur { font-family: "Inter", sans-serif; font-size: 14px; color: rgba(255,255,255,0.7); vertical-align: 8px; margin-right: 4px; letter-spacing: 0.5px; }
  .mbc-meta { font-size: 11.5px; color: rgba(255,255,255,0.75); margin-top: 8px; }
  .mbc-meta strong { color: #fff; }
  .mbc-right { display: flex; gap: 18px; }
  .mbc-flow { text-align: right; }
  .mbc-flow-lbl { font-size: 10px; letter-spacing: 0.6px; text-transform: uppercase; opacity: 0.75; }
  .mbc-flow-val { font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 14px; font-weight: 600; margin-top: 3px; }
  .mbc-flow-lbl.ok, .mbc-flow-val.ok { color: #8be0a8; }
  .mbc-flow-lbl.danger, .mbc-flow-val.danger { color: #ffb4b4; }
  .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; margin-bottom: 6px; }
  .modal-section { margin-bottom: 22px; }
  .modal-section h4 { font-size: 10.5px; letter-spacing: 0.8px; text-transform: uppercase; color: var(--muted); font-weight: 600; margin: 0 0 10px; display: flex; align-items: center; gap: 8px; }
  .modal-section h4 .count-pill { font-family: "JetBrains Mono", ui-monospace, monospace; background: #f0f1f3; color: var(--ink-2); font-size: 9.5px; padding: 1px 6px; border-radius: 999px; font-weight: 600; letter-spacing: 0.3px; }
  .modal-dl { display: grid; grid-template-columns: 110px 1fr; row-gap: 8px; column-gap: 14px; font-size: 12.5px; margin: 0; }
  .modal-dl dt { color: var(--muted); font-size: 11px; }
  .modal-dl dd { margin: 0; color: var(--ink); }
  .modal-dl dd.mono { font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 12px; font-weight: 500; }
  .coa-link { display: flex; align-items: center; gap: 14px; padding: 12px 14px; background: var(--accent-soft); border: 1px solid #c8d6e8; border-radius: 8px; }
  .coa-icon { width: 36px; height: 36px; border-radius: 8px; background: var(--accent); color: #fff; display: grid; place-items: center; flex-shrink: 0; }
  .coa-icon svg { width: 16px; height: 16px; }
  .coa-info { flex: 1; }
  .coa-code { font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 13px; font-weight: 600; color: var(--ink); }
  .coa-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .note-text { margin: 0; font-size: 12px; color: var(--ink-2); line-height: 1.5; font-style: italic; }
  .muted-text { margin: 0; font-size: 11.5px; color: var(--muted-2); font-style: italic; }
  .files-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .file-chip { display: inline-flex; align-items: center; gap: 6px; padding: 5px 10px; border: 1px solid var(--rule); border-radius: 6px; font-size: 11.5px; color: var(--ink-2); background: #fafafb; cursor: pointer; }
  .file-chip:hover { border-color: var(--ink-3); background: #fff; }
  .file-chip svg { width: 12px; height: 12px; color: var(--muted); }
  .mini-table { width: 100%; border-collapse: collapse; border: 1px solid var(--rule); border-radius: 6px; overflow: hidden; font-size: 11.5px; }
  .mini-table th { background: #fafafb; text-align: left; padding: 7px 10px; font-size: 9.5px; letter-spacing: 0.6px; text-transform: uppercase; color: var(--muted); font-weight: 600; border-bottom: 1px solid var(--rule); }
  .mini-table th.right, .mini-table td.right { text-align: right; }
  .mini-table td { padding: 8px 10px; color: var(--ink); border-top: 1px solid var(--rule-soft); }
  .mini-table td.mono { font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 11px; }
  .mini-table td.mono.ok { color: var(--ok); font-weight: 600; }
  .mini-table td.mono.danger { color: var(--danger); font-weight: 600; }
  .mini-table tr:first-child td { border-top: 0; }
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <div class="crumbs">
    <a href="Banking Management.html">Finance</a>
    <span class="sep">›</span>
    <a href="Banking Management.html">Banking</a>
    <span class="sep">›</span>
    <span class="here">Bank Accounts</span>
  </div>
  <div class="grow"></div>
  <span class="user-chip"><span class="av">F</span>Fatima A. (Banking Mgr)</span>
</div>

<div class="page" data-screen-label="02 Bank Accounts">

  <!-- Page header -->
  <header class="page-head">
    <div>
      <h1>Bank Accounts</h1>
      <div class="sub">Company bank accounts — balances, transactions, and links to the Chart of Accounts ledger.</div>
    </div>
    <div class="actions-row">
      <button class="btn"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Export</button>
      <button class="btn primary"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add Account</button>
    </div>
  </header>

  <!-- Primary tabs (links to other pages) -->
  <nav class="nav-tabs" role="tablist">
    <a class="nav-tab" href="Banking Management.html" role="tab">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      Payment Requests
      <span class="pill">72</span>

    <a class="nav-tab active" href="Bank Accounts.html" role="tab">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18M5 21V10m4 11V10m6 11V10m4 11V10M2 10l10-7 10 7"/></svg>
      Bank Accounts
      <span class="pill" id="acc-count">7</span>

    <a class="nav-tab" href="Transactions.html" role="tab">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
      Transactions
      <span class="pill">1,284</span>
    </a>
    <a class="nav-tab" href="#" onclick="event.preventDefault(); showToast('Reports — coming soon');" role="tab">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Reports
    </a>
  </nav>

  <!-- Totals -->
  <div class="totals-bar" id="totals-bar"></div>

  <!-- Filters -->
  <div class="accounts-bar">
    <div class="title">All accounts</div>
    <div class="filters">
      <div class="search-wrap">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" class="input" id="acc-search" placeholder="Search bank, code, A/C…" />
      </div>
      <div class="seg" id="status-seg">
        <button class="on" data-status="all">All</button>
        <button data-status="active">Active</button>
        <button data-status="inactive">Inactive</button>
      </div>
      <div class="seg" id="type-seg">
        <button class="on" data-type="all">All</button>
        <button data-type="bank">Bank</button>
        <button data-type="cash">Cash</button>
        <button data-type="mfs">MFS</button>
        <button data-type="wallet">Wallet</button>
      </div>
      <select class="select" id="currency-filter">
        <option value="">All currencies</option>
        <option value="BDT">BDT only</option>
        <option value="USD">USD only</option>
      </select>
    </div>
  </div>

  <div class="accounts-grid" id="accounts-grid"></div>

</div>
<!-- /.page -->

<!-- Modal mount -->
<div id="acc-modal"></div>

<!-- Shared bank accounts data -->
<script src="bank-data.js"></script>

<script>
  // ============================ State ============================
  let statusFilter = "all";
  let typeFilter = "all";
  let currencyFilter = "";
  let searchQuery = "";

  // Type icons (shown in pill)
  const TYPE_ICONS = {
    bank:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18M5 21V10m4 11V10m6 11V10m4 11V10M2 10l10-7 10 7"/></svg>',
    cash:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="1"/><circle cx="12" cy="12" r="2.5"/></svg>',
    mfs:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="11" y1="18" x2="13" y2="18"/></svg>',
    wallet: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4z"/></svg>',
  };

  const TYPE_LABELS = { bank: "Bank", cash: "Cash", mfs: "MFS", wallet: "Wallet" };

  // ============================ Render: Totals ============================
  function renderTotals() {
    const active = ACCOUNTS.filter(a => a.status === "active");
    const sumBy = (t) => active.filter(a => a.type === t && a.currency === "BDT").reduce((s, a) => s + a.balance, 0);
    const bankTotal   = sumBy("bank");
    const cashTotal   = sumBy("cash");
    const mfsTotal    = sumBy("mfs");
    const walletTotal = sumBy("wallet");
    const totalBalance = bankTotal + cashTotal + mfsTotal + walletTotal;
    const totalUSD     = active.filter(a => a.currency === "USD").reduce((s, a) => s + a.balance, 0);

    const counts = {
      bank:   active.filter(a => a.type === "bank").length,
      cash:   active.filter(a => a.type === "cash").length,
      mfs:    active.filter(a => a.type === "mfs").length,
      wallet: active.filter(a => a.type === "wallet").length,
    };

    const fmt = (n) => n.toLocaleString("en-BD");

    document.getElementById("totals-bar").innerHTML = `
      <div class="total-card main" style="grid-column: span 1;">
        <div class="lbl">Total available balance (BDT)</div>
        <div class="val"><span class="cur">BDT</span>${totalBalance.toLocaleString("en-BD", { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</div>
        <div class="meta">${active.length} active accounts ${totalUSD > 0 ? `· +$${totalUSD.toLocaleString()} USD` : ''} <span class="delta up">▲ 2.4% this week</span></div>
      </div>
      <div class="total-card" style="border-left: 4px solid #0d2a4a;">
        <div class="lbl"><span class="type-pill bank">BANK</span> &nbsp; ${counts.bank} accounts</div>
        <div class="val"><span class="cur">BDT</span>${fmt(bankTotal)}</div>
        <div class="meta">All bank accounts combined</div>
      </div>
      <div class="total-card" style="border-left: 4px solid #b45309;">
        <div class="lbl"><span class="type-pill cash">CASH</span> &nbsp; ${counts.cash} accounts</div>
        <div class="val"><span class="cur">BDT</span>${fmt(cashTotal)}</div>
        <div class="meta">Physical cash on hand</div>
      </div>
      <div class="total-card" style="border-left: 4px solid #be185d;">
        <div class="lbl"><span class="type-pill mfs">MFS</span> &nbsp; ${counts.mfs} accounts</div>
        <div class="val"><span class="cur">BDT</span>${fmt(mfsTotal)}</div>
        <div class="meta">Mobile financial services</div>
      </div>
      <div class="total-card" style="border-left: 4px solid #6d28d9;">
        <div class="lbl"><span class="type-pill wallet">WALLET</span> &nbsp; ${counts.wallet} accounts</div>
        <div class="val"><span class="cur">BDT</span>${fmt(walletTotal)}</div>
        <div class="meta">Digital wallets &amp; gateways</div>
      </div>
    `;
  }

  // ============================ Render: Cards ============================
  function renderAccounts() {
    const grid = document.getElementById("accounts-grid");
    const q = searchQuery.toLowerCase();

    const filtered = ACCOUNTS.filter(a => {
      if (statusFilter !== "all" && a.status !== statusFilter) return false;
      if (typeFilter !== "all" && a.type !== typeFilter) return false;
      if (currencyFilter && a.currency !== currencyFilter) return false;
      if (q && !(`${a.bank_name} ${a.code} ${a.ac_number} ${a.label} ${a.branch}`).toLowerCase().includes(q)) return false;
      return true;
    });

    const cardHTML = filtered.map(a => `
      <div class="acc-card" id="acc-${a.id}" data-acc-id="${a.id}" tabindex="0">
        <div class="stripe" style="background:${a.color}"></div>
        <div class="head">
          <div class="bank">
            <div class="logo" style="background:${a.color}">${a.logo}</div>
            <div>
              <div class="bank-name">${a.bank_name}</div>
              <div class="bank-br">${a.branch}</div>
            </div>
          </div>
          <span class="pill-row">
            <span class="type-pill ${a.type}">${TYPE_ICONS[a.type] || ''}${TYPE_LABELS[a.type] || a.type}</span>
            <span class="status-pill ${a.status}"><span class="dot"></span>${a.status}</span>
          </span>
        </div>
        <div class="label-row">
          <span>${a.label}</span>
          <span class="acc-code">${a.code}</span>
        </div>
        <div class="acno-row">
          <span class="acno-label">A/C</span>
          <span class="acno-val">${maskAcNo(a.ac_number)}</span>
        </div>
        <div class="balance"><span class="cur">${a.currency}</span>${a.balance.toLocaleString("en-BD", { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</div>
        <div class="flows">
          <div class="flow in">
            <div class="flow-lbl"><svg class="flow-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>Today in</div>
            <div class="flow-val">+${a.today_inflow.toLocaleString("en-BD")}</div>
          </div>
          <div class="flow out">
            <div class="flow-lbl"><svg class="flow-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>Today out</div>
            <div class="flow-val">−${a.today_outflow.toLocaleString("en-BD")}</div>
          </div>
        </div>
        <div class="footer">
          <div class="last">Last txn <span class="dt">${a.last_txn_date}</span> · ${a.last_txn_desc}</div>
          <div class="quick">
            <button title="Account details" data-act="details" data-acc="${a.id}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg></button>
            <button title="View statement" data-act="statement" data-acc="${a.id}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="13" y2="17"/></svg></button>
            <button title="Record transaction" data-act="transfer" data-acc="${a.id}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg></button>
          </div>
        </div>
      </div>
    `).join("");

    const addCard = `
      <div class="acc-card add" onclick="showToast('Open: Add new bank account form')">
        <div>
          <div class="plus"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div>
          <div class="lbl">Add bank account</div>
          <div class="desc">Connect a new account to receive or disburse funds</div>
        </div>
      </div>`;

    grid.innerHTML = cardHTML + (filtered.length > 0 ? addCard : `<div style="grid-column:1/-1; padding:60px 20px; text-align:center; color:var(--muted); background:var(--paper); border:1px dashed var(--rule); border-radius:10px;">No accounts match your filters.</div>` + addCard);

    // Wire card clicks
    grid.querySelectorAll(".acc-card[data-acc-id]").forEach(card => {
      card.addEventListener("click", (e) => {
        const qbtn = e.target.closest(".quick button");
        if (qbtn) {
          const act = qbtn.dataset.act;
          const id = +qbtn.dataset.acc;
          e.stopPropagation();
          if (act === "details") openAccountModal(id);
          else if (act === "statement") showToast("Opening statement for account #" + id);
          else if (act === "transfer") showToast("Opening transaction form for account #" + id);
          return;
        }
        openAccountModal(+card.dataset.accId);
      });
    });

    document.getElementById("acc-count").textContent = ACCOUNTS.length;
  }

  // ============================ Modal ============================
  function openAccountModal(id) {
    const a = ACCOUNTS.find(x => x.id === id);
    if (!a) return;
    const m = document.getElementById("acc-modal");
    m.innerHTML = `
      <div class="modal-backdrop" onclick="closeAccountModal()"></div>
      <div class="modal-panel" role="dialog">
        <div class="modal-head" style="border-top: 4px solid ${a.color};">
          <div class="modal-bank">
            <div class="modal-logo" style="background:${a.color}">${a.logo}</div>
            <div>
              <div class="modal-name">${a.bank_name}</div>
              <div class="modal-meta">${a.branch} · <span class="mono">${a.code}</span></div>
            </div>
          </div>
          <div class="modal-actions">
            <span class="type-pill ${a.type}">${TYPE_ICONS[a.type] || ''}${TYPE_LABELS[a.type] || a.type}</span>
            <span class="status-pill ${a.status}"><span class="dot"></span>${a.status}</span>
            <button class="btn"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Edit</button>
            <button class="modal-close" onclick="closeAccountModal()">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>
        </div>
        <div class="modal-body">
          <div class="modal-balance-card">
            <div class="mbc-left">
              <div class="mbc-label">Current balance · ${a.label}</div>
              <div class="mbc-val"><span class="cur">${a.currency}</span>${a.balance.toLocaleString("en-BD", { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</div>
              <div class="mbc-meta">Holder · <strong>${a.holder_name}</strong></div>
            </div>
            <div class="mbc-right">
              <div class="mbc-flow">
                <div class="mbc-flow-lbl ok">Today in</div>
                <div class="mbc-flow-val ok">+ ${a.today_inflow.toLocaleString("en-BD")}.00</div>
              </div>
              <div class="mbc-flow">
                <div class="mbc-flow-lbl danger">Today out</div>
                <div class="mbc-flow-val danger">− ${a.today_outflow.toLocaleString("en-BD")}.00</div>
              </div>
            </div>
          </div>
          <div class="modal-grid">
            <div class="modal-section">
              <h4>Account information</h4>
              <dl class="modal-dl">
                <dt>Type</dt><dd><span class="type-pill ${a.type}">${TYPE_ICONS[a.type] || ''}${TYPE_LABELS[a.type] || a.type}</span></dd>
                <dt>Account number</dt><dd class="mono">${a.ac_number}</dd>
                <dt>Account code</dt><dd class="mono">${a.code}</dd>
                <dt>Holder name</dt><dd>${a.holder_name}</dd>
                <dt>${a.type === "cash" ? "Location" : "Bank"}</dt><dd>${a.bank_name}</dd>
                <dt>${a.type === "cash" ? "Custodian" : "Branch"}</dt><dd>${a.branch}</dd>
                <dt>Routing no.</dt><dd class="mono">${a.route_code || '—'}</dd>
                <dt>SWIFT code</dt><dd class="mono">${a.swift_code || '—'}</dd>
              </dl>
            </div>
            <div class="modal-section">
              <h4>Contact &amp; address</h4>
              <dl class="modal-dl">
                <dt>Phone</dt><dd>${a.phone || '—'}</dd>
                <dt>Email</dt><dd>${a.email || '—'}</dd>
                <dt>Address</dt><dd style="line-height:1.5;">${a.address || '—'}</dd>
              </dl>
            </div>
          </div>
          <div class="modal-section linked">
            <h4>Linked Chart of Accounts</h4>
            <div class="coa-link">
              <div class="coa-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
              <div class="coa-info">
                <div class="coa-code">${a.account_code} · ${a.account_name}</div>
                <div class="coa-meta">${a.account_type} · accounts.id #${a.account_id} · All transactions post to this ledger</div>
              </div>
              <button class="btn">Open ledger →</button>
            </div>
          </div>
          ${a.note ? `<div class="modal-section"><h4>Notes</h4><p class="note-text">${a.note}</p></div>` : ''}
          <div class="modal-section">
            <h4>Attached files <span class="count-pill">${a.files_count}</span></h4>
            ${a.files_count > 0 ? `
              <div class="files-list">
                ${Array.from({length: Math.min(a.files_count, 5)}).map((_, i) => `
                  <div class="file-chip">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                    File ${i + 1}
                  </div>`).join('')}
              </div>` : '<p class="muted-text">No files attached.</p>'}
          </div>
          <div class="modal-section">
            <h4>Recent transactions</h4>
            <table class="mini-table">
              <thead>
                <tr><th>Date</th><th>Reference</th><th>Method</th><th class="right">Debit</th><th class="right">Credit</th></tr>
              </thead>
              <tbody>
                <tr><td class="mono">19 May 2026</td><td>${a.last_txn_desc}</td><td>Online</td><td class="right mono ok">+85,000.00</td><td class="right mono">—</td></tr>
                <tr><td class="mono">18 May 2026</td><td>Supplier payment · ABC Cement</td><td>Bank Transfer</td><td class="right mono">—</td><td class="right mono danger">−4,82,500.00</td></tr>
                <tr><td class="mono">17 May 2026</td><td>Customer installment · BR-2026-00139</td><td>Online</td><td class="right mono ok">+5,00,000.00</td><td class="right mono">—</td></tr>
                <tr><td class="mono">16 May 2026</td><td>Office utility · DESCO</td><td>Online</td><td class="right mono">—</td><td class="right mono danger">−78,400.00</td></tr>
              </tbody>
            </table>
            <button class="btn" style="margin-top: 12px;">View all transactions →</button>
          </div>
        </div>
      </div>
    `;
    m.classList.add("open");
    document.body.style.overflow = "hidden";
  }
  function closeAccountModal() {
    document.getElementById("acc-modal").classList.remove("open");
    document.body.style.overflow = "";
  }
  document.addEventListener("keydown", e => { if (e.key === "Escape") closeAccountModal(); });

  // ============================ Filters ============================
  document.getElementById("status-seg").addEventListener("click", e => {
    const b = e.target.closest("button"); if (!b) return;
    document.querySelectorAll("#status-seg button").forEach(x => x.classList.remove("on"));
    b.classList.add("on");
    statusFilter = b.dataset.status;
    renderAccounts();
  });
  document.getElementById("type-seg").addEventListener("click", e => {
    const b = e.target.closest("button"); if (!b) return;
    document.querySelectorAll("#type-seg button").forEach(x => x.classList.remove("on"));
    b.classList.add("on");
    typeFilter = b.dataset.type;
    renderAccounts();
  });
  document.getElementById("currency-filter").addEventListener("change", e => { currencyFilter = e.target.value; renderAccounts(); });
  document.getElementById("acc-search").addEventListener("input", e => { searchQuery = e.target.value; renderAccounts(); });

  // ============================ Toast ============================
  function showToast(msg) {
    let t = document.getElementById('__toast');
    if (!t) {
      t = document.createElement('div');
      t.id = '__toast';
      t.style.cssText = 'position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#14181f;color:#fff;padding:10px 18px;border-radius:8px;font-size:12.5px;font-weight:500;box-shadow:0 12px 36px rgba(0,0,0,0.25);z-index:200;opacity:0;transition:opacity .2s,transform .2s;';
      document.body.appendChild(t);
    }
    t.textContent = msg;
    requestAnimationFrame(() => { t.style.opacity = '1'; t.style.transform = 'translateX(-50%) translateY(0)'; });
    clearTimeout(t._timer);
    t._timer = setTimeout(() => { t.style.opacity = '0'; }, 1800);
  }

  // ============================ Init ============================
  renderTotals();
  renderAccounts();

  // Deep link: #acc-3 → highlight + scroll to that card (from balance-check "View account ›")
  if (location.hash && location.hash.startsWith("#acc-")) {
    setTimeout(() => {
      const el = document.querySelector(location.hash);
      if (el) {
        el.classList.add("target");
        el.scrollIntoView({ behavior: "smooth", block: "center" });
        setTimeout(() => el.classList.remove("target"), 2500);
      }
    }, 100);
  }
</script>
</body>
</html>
