<style type="text/tailwindcss">
@theme {
  --color-paper:   #FCFBF7;
  --color-canvas:  #F2EFE7;
  --color-ink-1:   #1A1814;
  --color-ink-2:   #5C5648;
  --color-ink-3:   #9B9686;
  --color-rule:    #EAE5D9;
  --color-accent:  #1F3A68;
  --color-sidebar: #1C1A17;
  --font-sans: "Inter", system-ui, sans-serif;
  --font-mono: "IBM Plex Mono", ui-monospace, monospace;
}
@layer base {
  *, *::before, *::after { box-sizing: border-box; }
  [x-cloak] { display: none !important; }
}
@layer components {
  /* ── Category tints ──────────────────────────────────────── */
  .t-crm      { background:#D8E4F5; color:#1F3D72; }
  .t-sales    { background:#D2E7D5; color:#1F5A2C; }
  .t-finance  { background:#F7E6C4; color:#7A5418; }
  .t-project  { background:#DCD9F2; color:#3A3582; }
  .t-marketing{ background:#F1D3CE; color:#7A2A1E; }
  .t-hr       { background:#CCE6E2; color:#1F5A52; }
  .t-inventory{ background:#E4E1C4; color:#5C5A1E; }
  .t-document { background:#DCE0E6; color:#44505E; }
  .t-custom   { background:#E8E2D6; color:#5C4A2E; }
  .d-crm      { background:#1F3D72; }
  .d-sales    { background:#1F5A2C; }
  .d-finance  { background:#7A5418; }
  .d-project  { background:#3A3582; }
  .d-marketing{ background:#7A2A1E; }
  .d-hr       { background:#1F5A52; }
  .d-inventory{ background:#5C5A1E; }
  .d-document { background:#44505E; }
  .d-custom   { background:#5C4A2E; }

  /* ── Buttons ─────────────────────────────────────────────── */
  .btn { appearance:none; border:1px solid var(--color-rule); background:var(--color-paper); color:var(--color-ink-1); padding:7px 14px; font:500 12px "Inter",sans-serif; border-radius:6px; cursor:pointer; display:inline-flex; align-items:center; gap:6px; text-decoration:none; }
  .btn:hover { background:rgba(0,0,0,.03); }
  .btn svg { width:14px; height:14px; }
  .btn-primary { background:var(--color-ink-1); color:var(--color-paper); border-color:var(--color-ink-1); }
  .btn-primary:hover { background:#000; }

  /* ── Report card ─────────────────────────────────────────── */
  .rep-card { display:flex; align-items:center; gap:14px; padding:16px 18px; border-radius:11px; background:var(--color-paper); border:1px solid var(--color-rule); cursor:pointer; text-decoration:none; color:var(--color-ink-1); transition:border-color .14s,box-shadow .14s,transform .14s; }
  .rep-card:hover { border-color:var(--color-ink-3); box-shadow:0 4px 16px -10px rgba(0,0,0,.18); transform:translateY(-1px); }
  .rc-ic { width:48px; height:48px; border-radius:12px; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
  .rc-ic svg { width:22px; height:22px; }
  .rc-name { font-size:13.5px; font-weight:600; line-height:1.3; }
  .rc-desc { margin-top:3px; font-size:12px; color:var(--color-ink-2); line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .rc-chev { color:var(--color-ink-3); display:flex; flex-shrink:0; transform:translateX(0); transition:transform .14s,color .14s; }
  .rc-chev svg { width:16px; height:16px; }
  .rep-card:hover .rc-chev { color:var(--color-ink-1); transform:translateX(3px); }

  /* ── Sidebar nav items ───────────────────────────────────── */
  .nav-item { display:flex; align-items:center; gap:12px; padding:8px 12px; border-radius:7px; font:500 13px "Inter",sans-serif; color:rgba(255,255,255,.65); text-decoration:none; transition:background .12s,color .12s; cursor:pointer; width:100%; border:0; background:transparent; text-align:left; }
  .nav-item:hover { background:rgba(255,255,255,.07); color:rgba(255,255,255,.92); }
  .nav-item.active { background:rgba(255,255,255,.10); color:#fff; }
  .nav-item svg { width:15px; height:15px; flex-shrink:0; opacity:.75; }
  .nav-item.active svg { opacity:1; }
  .nav-label { font:600 9.5px var(--font-mono); letter-spacing:.1em; text-transform:uppercase; color:rgba(255,255,255,.28); padding:16px 12px 4px; }

  /* ── Other category pills ────────────────────────────────── */
  .other-pill { display:inline-flex; align-items:center; gap:7px; padding:7px 12px; border-radius:8px; background:var(--color-paper); border:1px solid var(--color-rule); font:500 12.5px "Inter",sans-serif; color:var(--color-ink-2); text-decoration:none; cursor:pointer; transition:border-color .12s,color .12s,background .12s; }
  .other-pill:hover { border-color:var(--color-ink-3); color:var(--color-ink-1); background:rgba(0,0,0,.018); }
  .other-pill.active-pill { background:var(--color-ink-1); color:var(--color-paper); border-color:var(--color-ink-1); }
  .op-ic { width:22px; height:22px; border-radius:6px; display:flex; align-items:center; justify-content:center; }
  .op-ic svg { width:11px; height:11px; }
}
</style>
</head>

<!-- ═══ MAIN ══════════════════════════════════════════════════════════════ -->
<main class="flex-1 overflow-y-auto bg-canvas" x-data="categoryPage()">
  <div class="max-w-[1100px] mx-auto px-6 py-7">

    <!-- Breadcrumb -->
    <div class="flex items-center gap-1.5 text-[11.5px] font-mono text-ink-3 mb-3.5">
      <a href="#" class="hover:text-ink-1 transition-colors">Admin</a>
      <span class="opacity-50">/</span>
      <a href="Reports.html" class="hover:text-ink-1 transition-colors">Reports</a>
      <span class="opacity-50">/</span>
      <span class="text-ink-1" x-text="active ? active.name : ''"></span>
    </div>

    <!-- Category hero -->
    <div class="flex items-center gap-5 bg-paper border border-rule rounded-[14px] px-6 py-5 mb-5" x-show="active">
      <div class="w-16 h-16 rounded-2xl flex-shrink-0 flex items-center justify-center" :class="active ? 't-' + active.key : ''"
           x-html="active ? icons[active.key] : ''"></div>
      <div class="flex-1 min-w-0">
        <h1 class="text-[21px] font-semibold tracking-tight" x-text="active ? active.name : ''"></h1>
        <div class="mt-1 flex items-center gap-2 text-[12px] font-mono text-ink-2">
          <span x-text="active ? active.items.length + ' reports' : ''"></span>
          <span class="w-[3px] h-[3px] rounded-full bg-ink-3"></span>
          <span>Reports module</span>
        </div>
        <div class="mt-1.5 text-[13px] text-ink-2 leading-snug" x-text="active ? active.desc : ''"></div>
      </div>
      <a href="Reports.html" class="btn flex-shrink-0">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        All reports
      </a>
    </div>

    <!-- Report cards 3-col grid -->
    <div class="grid grid-cols-3 gap-3 mb-10" x-show="active">
      <template x-for="item in (active ? active.items : [])" :key="item.name">
        <a class="rep-card" href="#">
          <div class="rc-ic" :class="active ? 't-' + active.key : ''"
               x-html="active ? icons[active.key] : ''"></div>
          <div class="flex-1 min-w-0">
            <div class="rc-name" x-text="item.name"></div>
            <div class="rc-desc" x-text="item.desc"></div>
          </div>
          <span class="rc-chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></span>
        </a>
      </template>
    </div>

    <!-- Browse other categories -->
    <div x-show="active">
      <div class="text-[10.5px] font-mono text-ink-3 uppercase tracking-widest mb-3">Browse categories</div>
      <div class="flex flex-wrap gap-2">
        <template x-for="cat in cats" :key="cat.key">
          <a :href="'Report Category.html#' + cat.key"
             class="other-pill"
             :class="cat.key === (active ? active.key : '') ? 'active-pill' : ''">
            <span class="op-ic" :class="'t-' + cat.key" x-html="icons[cat.key]"></span>
            <span x-text="cat.name.replace(' Reports','')"></span>
          </a>
        </template>
      </div>
    </div>

  </div>
</main>
